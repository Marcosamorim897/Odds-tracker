services:
  - type: web
    name: odds-tracker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: ODDS_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
